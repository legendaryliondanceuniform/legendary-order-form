<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGENDARY Order Form</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #1a1a1a; color: #fff; line-height: 1.6; padding: 20px; max-width: 600px; margin: 0 auto; }
        .container { background-color: #000; border: 1px solid #333; padding: 30px; border-radius: 8px; }
        h1 { text-align: center; letter-spacing: 2px; font-size: 24px; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 30px; }
        .price-box { border: 1px solid #d4af37; padding: 15px; margin-bottom: 30px; text-align: center; color: #d4af37; font-size: 14px; }
        .price-box p { margin: 5px 0; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 12px; font-weight: bold; letter-spacing: 1px; color: #ccc; }
        input, select { width: 100%; padding: 12px; background-color: #111; border: 1px solid #333; color: #fff; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        input:focus, select:focus { outline: none; border-color: #d4af37; }
        .btn { width: 100%; padding: 15px; background-color: #d4af37; color: #000; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: background-color 0.3s; }
        .btn:hover { background-color: #b89600; }
        .btn:disabled { background-color: #555; cursor: not-allowed; }

        .btn-secondary { width: 100%; padding: 12px; background-color: #222; color: #fff; border: 1px dashed #d4af37; border-radius: 4px; font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 10px; margin-bottom: 20px; transition: background-color 0.3s; }
        .btn-secondary:hover { background-color: #333; }

        .row { display: flex; gap: 15px; }
        .col { flex: 1; }

        .item-row { border: 1px solid #444; padding: 15px; margin-bottom: 15px; border-radius: 6px; background-color: #0a0a0a; position: relative; }
        .remove-btn { position: absolute; top: 10px; right: 10px; background: transparent; color: #ff4444; border: none; font-size: 12px; cursor: pointer; font-weight: bold; }
        .remove-btn:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>LEGENDARY</h1>
        <div class="subtitle">LEGENDARY X 黃奕銘<br>W(R)E-Start Graphic Tee</div>

        <div class="price-box">
            <p style="font-weight: bold; margin-bottom: 10px;">PRE-ORDER BEFORE 5 MAY — 20% OFF</p>
            <div style="display: flex; justify-content: space-around;">
                <div>HKD 216<br>SGD 35</div>
                <div>MYR 120<br>CNY 198</div>
            </div>
        </div>

        <form id="orderForm">
            <!-- 聯絡資料 -->
            <div class="form-group">
                <label>CUSTOMER NAME / 顧客名稱</label>
                <input type="text" id="customerName" required placeholder="Your full name">
            </div>

            <div class="form-group">
                <label>IG HANDLE / IG 帳號 (Optional)</label>
                <input type="text" id="igHandle" placeholder="@your_ig">
            </div>

            <div class="form-group">
                <label>PHONE NUMBER / 聯絡電話</label>
                <div style="display: flex; gap: 10px;">
                    <select id="countryCode" style="width: 180px;" required>
                        <option value="+852">+852 香港 Hong Kong</option>
                        <option value="+853">+853 澳門 Macau</option>
                        <option value="+886">+886 台灣 Taiwan</option>
                        <option value="+60">+60 馬來西亞 Malaysia</option>
                        <option value="+65">+65 新加坡 Singapore</option>
                        <option value="+86">+86 中國內地 China</option>
                        <option value="+1">+1 美國/加拿大 US/Canada</option>
                        <option value="+44">+44 英國 UK</option>
                        <option value="+81">+81 日本 Japan</option>
                        <option value="+61">+61 澳洲 Australia</option>
                        <option value="+">+ 其他 Other</option>
                    </select>
                    <input type="tel" id="phone" style="flex: 1;" required placeholder="12345678">
                </div>
            </div>

            <div style="border-top: 1px solid #333; margin: 30px 0;"></div>

            <!-- 收件地址 -->
            <div class="form-group">
                <label>SHIPPING ADDRESS / 收件地址</label>
                <input type="text" id="address1" required placeholder="Street address, P.O. box, company name" style="margin-bottom: 10px;">
                <input type="text" id="address2" placeholder="Apartment, suite, unit, building, floor, etc.">
            </div>

            <div class="row">
                <div class="col form-group">
                    <label>CITY / 城市</label>
                    <input type="text" id="city" required>
                </div>
                <div class="col form-group">
                    <label>COUNTRY / 國家或地區</label>
                    <select id="country" required>
                        <option value="HK">Hong Kong (香港)</option>
                        <option value="MO">Macau (澳門)</option>
                        <option value="TW">Taiwan (台灣)</option>
                        <option value="MY">Malaysia (馬來西亞)</option>
                        <option value="SG">Singapore (新加坡)</option>
                        <option value="CN">China (中國內地)</option>
                        <option value="US">United States</option>
                        <option value="UK">United Kingdom</option>
                        <option value="OTHER">Other</option>
                    </select>
                </div>
            </div>

            <div style="border-top: 1px solid #333; margin: 30px 0;"></div>

            <!-- 訂單內容 -->
            <div class="form-group">
                <label>PAYMENT CURRENCY / 付款貨幣</label>
                <select id="currency" required>
                    <option value="HKD">HKD - 港幣 ($216)</option>
                    <option value="MYR">MYR - 馬幣 (RM120)</option>
                    <option value="SGD">SGD - 新加坡幣 ($35)</option>
                    <option value="CNY">CNY - 人民幣 (¥198)</option>
                    <option value="TWD">TWD - 台幣 (NT$880)</option>
                    <option value="USD">USD - 美元 ($28)</option>
                </select>
            </div>

            <!-- 購物車清單區 -->
            <div id="itemsContainer">
                <!-- JavaScript 會自動加第一件衫入嚟 -->
            </div>

            <!-- 加入其他款式按鈕 -->
            <button type="button" id="addItemBtn" class="btn-secondary">+ ADD ANOTHER ITEM / 加入其他款式</button>

            <button type="submit" class="btn" id="submitBtn">PROCEED TO CHECKOUT</button>
        </form>
    </div>

    <script>
        const itemsContainer = document.getElementById('itemsContainer');
        const addItemBtn = document.getElementById('addItemBtn');

        function createItemRow() {
            const div = document.createElement('div');
            div.className = 'item-row';

            div.innerHTML = `
                <button type="button" class="remove-btn">✕ REMOVE</button>
                <div class="form-group" style="margin-top: 10px;">
                    <label>PRODUCT / 款式</label>
                    <select class="item-product" required>
                        <option value="">Select Style / 選擇款式</option>
                        <option value="Style A - W(R)E-Start Graphic Tee">Style A / 款式A (前印)</option>
                        <option value="Style B - W(R)E-Start Graphic Tee">Style B / 款式B (後印)</option>
                    </select>
                </div>
                <div class="row">
                    <div class="col form-group">
                        <label>SIZE / 尺寸</label>
                        <select class="item-size" required>
                            <option value="">Select Size</option>
                            <option value="S">S</option>
                            <option value="M">M</option>
                            <option value="L">L</option>
                            <option value="XL">XL</option>
                            <option value="XXL">XXL</option>
                        </select>
                    </div>
                    <div class="col form-group">
                        <label>QTY / 數量</label>
                        <input type="number" class="item-qty" value="1" min="1" required>
                    </div>
                </div>
            `;

            div.querySelector('.remove-btn').addEventListener('click', () => {
                if (itemsContainer.children.length > 1) {
                    div.remove();
                } else {
                    alert('最少需要購買一件商品 / At least one item is required.');
                }
            });

            itemsContainer.appendChild(div);
        }

        createItemRow();

        addItemBtn.addEventListener('click', () => {
            createItemRow();
        });

        document.getElementById('orderForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'PROCESSING...';

            try {
                const items = [];
                document.querySelectorAll('.item-row').forEach(row => {
                    items.push({
                        product: row.querySelector('.item-product').value,
                        size: row.querySelector('.item-size').value,
                        quantity: row.querySelector('.item-qty').value
                    });
                });

                const data = {
                    customerName: document.getElementById('customerName').value,
                    igHandle: document.getElementById('igHandle').value,
                    phone: document.getElementById('countryCode').value + ' ' + document.getElementById('phone').value,
                    address: {
                        line1: document.getElementById('address1').value,
                        line2: document.getElementById('address2').value,
                        city: document.getElementById('city').value,
                        country: document.getElementById('country').value
                    },
                    currency: document.getElementById('currency').value,
                    items: items
                };

                const response = await fetch('/api/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.url) {
                    window.location.href = result.url;
                } else {
                    throw new Error(result.error || 'Something went wrong');
                }
            } catch (error) {
                alert('Error: ' + error.message);
                btn.disabled = false;
                btn.textContent = 'PROCEED TO CHECKOUT';
            }
        });
    </script>
</body>
</html>
